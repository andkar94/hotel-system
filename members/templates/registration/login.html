{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log-in to the system</title>
	<link rel="stylesheet" href="{% static 'css\login\style.css' %}">
</head>
<body>  
   <div class="logging">
	<div class="tittle">
     <h1>
    HotelFlow System 
   </h1>
   </div>
	<form action="{% url 'login' %}" method="post">
	    {% csrf_token %}

		{% if form.errors %}
		  <p style="color: red;">Invalid login or password.</p>
		{% endif %}
		
		<input type="text" name="username" class="field" placeholder="Login" autofocus required>
		<input type="password" name="password" class="field" placeholder="Password" required>
		<input type="submit" value="LOG-IN">
	</form>
   </div>  
</body>
</html>
