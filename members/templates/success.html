{% extends 'master.html' %}

{% block page_name %} Hotel Management System - Success {% endblock %}

{% block content %}

<div class="container py-5">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 800px; border-radius: 10px;">
        <div class="card-body p-4 p-md-5">
            
            <div class="row align-items-center py-3 border-bottom border-light-subtle">
                <div class="col-sm-4">
                    <span class="fw-bold text-secondary fs-5">Guest:</span>
                </div>
                <div class="col-sm-8">
                    <span class="fs-5">{{ guest }}</span>
                </div>
            </div>

            <div class="row align-items-center py-3 border-bottom border-light-subtle">
                <div class="col-sm-4">
                    <span class="fw-bold text-secondary fs-5">Stay:</span>
                </div>
                <div class="col-sm-8">
                    <span class="fs-5">{{ start }} - {{ end }}</span>
                </div>
            </div>

            <div class="row align-items-center py-4">
                <div class="col-sm-4">
                    <span class="fw-bold text-secondary fs-5">Total cost:</span>
                </div>
                <div class="col-sm-8">
                    <span class="fs-4 fw-bold text-dark">{{ payment }} PLN</span>
                </div>
            </div>

                <div class="d-flex justify-content-center gap-3 mt-4">
                    <a href="/" class="btn btn-success btn-lg px-4 py-2 d-flex align-items-center shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-check-circle-fill me-2" viewBox="0 0 16 16">
                            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                        </svg>
                        Return to Main Panel
                    </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
